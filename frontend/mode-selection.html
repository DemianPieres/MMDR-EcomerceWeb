<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selección de Modo - MMDR</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Bai+Jamjuree:wght@400;500;600;700&family=Inter:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="mode-selection-styles.css" />
</head>
<body>

  <div class="bg-layer" aria-hidden="true"></div>
  <div class="bg-blob-1" aria-hidden="true"></div>
  <div class="bg-blob-2" aria-hidden="true"></div>
  <div class="bg-blob-3" aria-hidden="true"></div>
  <div class="bg-blob-4" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="container">

    <h1 class="main-title">
      Bienvenido de Nuevo<br>Administrador
    </h1>

    <p class="subtitle">¿En que modo desea visualizar la web?</p>

    <div class="btn-row">
      <button id="btn-admin" class="btn-mode" type="button">
        Modo Administrador
        <span class="arrow">→</span>
      </button>

      <button id="btn-usuario" class="btn-mode" type="button">
        Modo Usuario
        <span class="arrow">→</span>
      </button>
    </div>

  </main>

  <footer class="footer">
    <img
      src="Imagenes/logofootermodeselection.png"
      alt="Logo Innova+"
      class="footer-logo"
    />
    <span class="footer-copy">© Diseñado por Innova+</span>
  </footer>

  <script src="scripts.js"></script>
  <script src="mode-selection-page.js"></script>

</body>
</html>
