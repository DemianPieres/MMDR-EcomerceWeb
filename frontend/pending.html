<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago pendiente - MMDR</title>
    <link rel="stylesheet" href="checkout-styles.css">
    <link rel="stylesheet" href="chatbot.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="checkout-result-body">
    <main class="checkout-result-main">
        <div class="checkout-result-card pending">
            <i class="fas fa-clock"></i>
            <h1>Pago pendiente</h1>
            <p>Tu pago quedó pendiente de acreditación (por ejemplo, un cupón de pago en efectivo).</p>
            <p class="small">
                Te avisaremos cuando Mercado Pago confirme el pago. También podrás ver el estado desde tu cuenta.
            </p>
            <button class="btn-primary" onclick="window.location.href='productos.html'">
                Volver a la tienda
            </button>
        </div>
    </main>
    <script src="chatbot.js"></script>
</body>
</html>
